# Top-1 of bilinear_sweep (g28ahef2): eager-sweep-27 — val/rs_ta_mean@50=6.2465.
# Retrain with this config to record val+test rs_ta_mean@{10,30,50,100}.
experiment:
  name: bilinear_top5_top1_eager_sweep27
data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/graph/hetero_graph_with_features_datatype.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/progression/temporal_graph_datatype_mappings.pt
  undirected: true
  train_cutoff_year: 2010
  val_min_year: 2013
  val_max_year: 2013
model:
  name: hgt
  hidden_dim: 128
  num_heads: 2
  num_layers: 2
  dropout: 0.5
  use_rte: false
  use_edge_features: true
  edge_feat_cols: [0, 1]
  edge_feat_dim: 2
  decoder_kind: bilinear_lr16
  decoder_dropout: 0.5
train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/23.06/runs/bilinear_top5/top1_eager_sweep27
  num_epochs: 60
  lr: 9.432537258399422e-05
  weight_decay: 0.002456059868028864
  eta_min: 1.0e-07
  cosine_t_max: 30
  batch_size: 256
  num_neighbors: [10, 5]
  lambdarank:
    impl: allrank
    weighing_scheme: lambdaRank_scheme
    sigma: 1.6555943595074432
    ndcg_k: 50
  early_stopping:
    enabled: true
    patience: 10
    metric: rs_ta_mean@50
    mode: max
seed: 42
