# Top-3 of bilinear_sweep (g28ahef2): lucky-sweep-26 — val/rs_ta_mean@50=5.4665.
experiment:
  name: bilinear_top5_top3_lucky_sweep26
data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/graph/hetero_graph_with_features_datatype.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/progression/temporal_graph_datatype_mappings.pt
  undirected: true
  train_cutoff_year: 2010
  val_min_year: 2013
  val_max_year: 2013
model:
  name: hgt
  hidden_dim: 128
  num_heads: 1
  num_layers: 2
  dropout: 0.4
  use_rte: false
  use_edge_features: true
  edge_feat_cols: [0, 1]
  edge_feat_dim: 2
  decoder_kind: bilinear_lr8
  decoder_dropout: 0.5
train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/23.06/runs/bilinear_top5/top3_lucky_sweep26
  num_epochs: 60
  lr: 4.7638232578399614e-05
  weight_decay: 0.0015939536737854473
  eta_min: 1.0e-07
  cosine_t_max: 50
  batch_size: 128
  num_neighbors: [10, 5]
  lambdarank:
    impl: allrank
    weighing_scheme: lambdaRank_scheme
    sigma: 1.7078282486314382
    ndcg_k: 50
  early_stopping:
    enabled: true
    patience: 10
    metric: rs_ta_mean@50
    mode: max
seed: 42
