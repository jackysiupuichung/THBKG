experiment:
  name: b3_gatv2_score

data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/graph/hetero_graph_with_features_datatype.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/progression/temporal_graph_datatype_mappings.pt

model:
  name: gatv2
  hidden_dim: 32
  num_heads: 4
  num_layers: 1
  dropout: 0.25
  edge_feat_cols: [0]
  edge_feat_dim: 1

train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/23.06/runs/b3_gatv2_score_datatype
  num_epochs: 50
  lr: 0.0007017392426675233
  weight_decay: 1.3382693305349503e-06
  batch_size: 256
  num_neighbors: [10, 20]
  focal_gamma: 2.0
  early_stopping:
    enabled: true
    patience: 10
