# EAHGT (p3) with a BILINEAR decoder (score = z_t^T W z_d + bias) instead
# of the default 3-layer MLP. Same HPs as headline/p3_eahgt_both_s42.yaml;
# only the decoder differs.
#
# Motivation: diagnose_collapse.py + diagnose_centering.py showed the MLP
# decoder produces an additive per-disease offset (collapse ratio ≈ 14×).
# A bilinear decoder cannot produce a near-constant score across all
# targets for a fixed disease — it is multiplicative in both endpoints.
experiment:
  name: p3_eahgt_both_bilinear_s42
data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/graph/hetero_graph_with_features_datatype.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/progression/temporal_graph_datatype_mappings.pt
  undirected: true
  train_cutoff_year: 2010
  val_min_year: 2013
  val_max_year: 2013
model:
  name: hgt
  hidden_dim: 128
  num_heads: 2
  num_layers: 2
  dropout: 0.2
  use_rte: false
  use_edge_features: true
  edge_feat_cols:
  - 0
  - 1
  edge_feat_dim: 2
  decoder_kind: bilinear
  decoder_dropout: 0.2
train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/23.06/runs/headline_bilinear/p3_eahgt_both_s42
  num_epochs: 40
  lr: 0.0004346878320299101
  weight_decay: 0.0018260646941480677
  eta_min: 1.0e-06
  cosine_t_max: 10
  batch_size: 256
  num_neighbors:
  - 20
  - 10
  lambdarank:
    impl: allrank
    weighing_scheme: lambdaRank_scheme
    sigma: 1.4319388789983414
    ndcg_k: 50
  early_stopping:
    enabled: true
    patience: 10
    metric: rs_ta_mean@50
    mode: max
seed: 42
