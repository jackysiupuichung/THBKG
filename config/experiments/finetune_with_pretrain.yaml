experiment:
  name: finetune_with_pretrain
  
model:
  name: gatv2
  pretrained_checkpoint: runs/pretrain_static/pretrained.pt
  hgt:
    hidden_dim: 128
    num_heads: 4
    num_layers: 2
    dropout: 0.1

data:
  temporal_graph_file: output/progression/temporal_graph_sample.pt
  graph:
    supervision:
      src_type: disease
      dst_type: target
      relation: clinical_trial_positive
  temporal_split:
    train: [2000, 2016]
    val: [2017, 2020]
    test: [2021, 2024]

train:
  num_epochs: 100
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  early_stopping:
    enabled: true
    patience: 10

eval:
  k_values: [5, 10, 20, 50]

wandb:
  enabled: true
  project: opentarget_benchmark
