experiment:
  name: finetune_with_pretrain
  
model:
  name: gatv2
  use_encoder: true
  pretrained_checkpoint: runs/pretrain_static_gatv2/pretrained_best.pt
  freeze_encoder: true
  encoder:
    name: gatv2
    hidden_dim: 32
    num_heads: 4
    num_layers: 2
    dropout: 0.1
    pretrained_checkpoint: runs/pretrain_static_gatv2/pretrained_best.pt
  decoder:
    hidden_dim: 32
    dropout: 0.1

data:
  graph_file: output/graph/hetero_graph_with_features.pt
  mappings_file: output/graph/hetero_mappings.pt
  graph:
    supervision:
      src_type: disease
      dst_type: target
      relation: clinical_trial_positive
  temporal_split:
    train:
    - null
    - '2016'
    val:
    - '2017'
    - '2020'
    test:
    - '2021'
    - '2024'

pretrain:
  num_epochs: 1
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 512
  num_neighbors: [5]
  neg_sampling_ratio: 1.0
  num_neg_samples: 1
  num_workers: 4
  early_stopping_patience: 10
  output_dir: runs/pretrain_static_gatv2
  
  # Temporal split configuration (accumulative snapshots)
  temporal_split:
    train: [1990, 2015]
    val: [2016, 2017]
    test: [2018, 2024]

train:
  num_epochs: 2
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  negative_ratio: 15
  output_dir: runs/finetune_with_pretrain
  early_stopping:
    enabled: true
    patience: 10

eval:
  k_values: [100, 200, 500]

wandb:
  enabled: true
  project: opentarget_benchmark
