experiment:
  name: pretrain_time_agnostic

model:
  name: gatv2
  hidden_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1

data:
  graph_file: output/graph/hetero_graph_with_features_sample.pt

pretrain:
  num_epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  mask_rate: 0.15
  output_dir: runs/pretrain_static

wandb:
  enabled: false
  project: opentarget_pretrain
  entity: null
