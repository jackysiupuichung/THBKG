experiment:
  name: clinical_feature_baseline

model:
  use_encoder: false  # Use direct node features (no encoder)
  decoder:
    hidden_dim: 256
    dropout: 0.3

data:
  graph_file: output/graph/hetero_graph_with_features.pt
  mappings_file: output/graph/hetero_mappings.pt

  # Explicit Temporal Splits for Logging
  temporal_split:
    train: [null, "2015"]
    val:   ["2015", "2017"]
    test:  ["2017", "2024"]

train:
  num_epochs: 100
  lr: 0.001
  weight_decay: 0.0001
  negative_ratio: 15
  use_huber: false  # Will be interpreted as BCE for training, MSE for eval
  force_mse_eval: true # New flag to explicitely use MSE for reporting
  output_dir: runs/clinical_feature_baseline

debug: false
