# Bilinear-decoder W&B Bayesian sweep on EAHGT (s42).
#
# Why this sweep:
#  - The 6-run grid in config/experiments/bilinear_tune/ all early-stopped
#    within 2-4 epochs at lr=4e-4 / cosine_t_max=10. That schedule is too
#    aggressive for the bilinear decoder; the model saturates before it
#    can learn pairwise structure.
#  - This sweep lowers the LR floor by ~40x, extends the cosine schedule,
#    and treats decoder rank (full / 16 / 8) as a tunable HP rather than
#    a separate experiment.
#  - Selection metric: val/rs_ta_mean@50 (matches early_stopping.metric).
#
# Launch: src/tune_advancement_lambdarank.py via the sbatch agent script.
experiment:
  name: bilinear_sweep

data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/graph/hetero_graph_with_features_datatype.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/progression/temporal_graph_datatype_mappings.pt
  undirected: true
  train_cutoff_year: 2010
  val_min_year: 2013
  val_max_year: 2013

model:
  name: hgt
  hidden_dim: 128
  num_heads: 2
  num_layers: 2
  dropout: 0.2
  use_rte: false
  use_edge_features: true
  edge_feat_cols: [0, 1]
  edge_feat_dim: 2
  decoder_kind: bilinear     # overridden by sweep
  decoder_dropout: 0.2

train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/23.06/runs/bilinear_sweep
  num_epochs: 50
  lr: 1.0e-4                 # placeholder; overridden by sweep
  weight_decay: 0.003        # placeholder; overridden by sweep
  eta_min: 1.0e-7
  cosine_t_max: 20           # placeholder; overridden by sweep
  batch_size: 256            # placeholder; overridden by sweep
  num_neighbors: [20, 10]    # placeholder; overridden by sweep
  lambdarank:
    impl: allrank
    weighing_scheme: lambdaRank_scheme
    sigma: 1.4319388789983414
    ndcg_k: 50
  early_stopping:
    enabled: true
    patience: 10
    metric: rs_ta_mean@50
    mode: max

seed: 42

tune:
  study_name: bilinear_sweep_eahgt_s42
  n_trials: 40
  metric: val/rs_ta_mean@50

  search_space:
    # ----- decoder (the whole point) -----
    decoder_kind: [bilinear, bilinear_lr16, bilinear_lr8]
    decoder_dropout: {low: 0.1, high: 0.5, step: 0.1}

    # ----- model capacity -----
    hidden_dim: [128, 64]
    num_heads:  [1, 2]
    num_layers: [2]
    dropout:    {low: 0.1, high: 0.5, step: 0.1}

    # ----- optimiser (lower-LR-biased; prior runs saturated at 4e-4) -----
    lr:           {low: 1.0e-5, high: 3.0e-4, log: true}
    weight_decay: {low: 1.0e-4, high: 3.0e-2, log: true}
    cosine_t_max: [20, 30, 50]

    # ----- data loading -----
    batch_size:      [128, 256, 512]
    num_neighbors_0: [10, 20]
    num_neighbors_1: [5, 10]

    # ----- LambdaRank -----
    sigma:  {low: 0.8, high: 2.0}
    ndcg_k: [50]
