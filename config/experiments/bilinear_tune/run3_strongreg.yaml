# Bilinear-decoder tuning run run3_strongreg. Inherits EAHGT p3_eahgt_both HPs from
# headline/p3_eahgt_both_s42.yaml; overrides only the variants listed.
experiment:
  name: bilinear_tune_run3_strongreg
data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/graph/hetero_graph_with_features_datatype.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/progression/temporal_graph_datatype_mappings.pt
  undirected: true
  train_cutoff_year: 2010
  val_min_year: 2013
  val_max_year: 2013
model:
  name: hgt
  hidden_dim: 128
  num_heads: 2
  num_layers: 2
  dropout: 0.4
  use_rte: false
  use_edge_features: true
  edge_feat_cols: [0, 1]
  edge_feat_dim: 2
  decoder_kind: bilinear
  decoder_dropout: 0.4
train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/23.06/runs/bilinear_tune/run3_strongreg
  num_epochs: 60
  lr: 0.0004
  weight_decay: 0.01
  eta_min: 1.0e-06
  cosine_t_max: 10
  batch_size: 256
  num_neighbors: [20, 10]
  lambdarank:
    impl: allrank
    weighing_scheme: lambdaRank_scheme
    sigma: 1.4319388789983414
    ndcg_k: 50
  early_stopping:
    enabled: true
    patience: 10
    metric: rs_ta_mean@50
    mode: max
seed: 42
