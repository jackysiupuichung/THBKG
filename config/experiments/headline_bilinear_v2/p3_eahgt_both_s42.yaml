# EAHGT p3 with BILINEAR decoder, HPs from zany-sweep-6 of the
# bilinear_sweep (W&B sweep 4dscpan7).
#
# zany-sweep-6 was the most stable top-5 trial — val rs_ta_mean@K
# {5.12 / 4.77 / 3.74 / 2.18} at K={10,30,50,100}, the only top trial
# whose per-TA RS degrades gracefully with K rather than spiking and
# collapsing. Selected as the headline bilinear default.
#
# Differences vs headline_bilinear/p3_eahgt_both_s42.yaml (the prior
# bilinear baseline that inherited MLP HPs):
#   - decoder_kind:   bilinear      -> bilinear_lr16
#   - lr:             4.35e-4       -> 4.6e-5      (~10x lower)
#   - weight_decay:   1.83e-3       -> 9.8e-3      (~5x higher)
#   - dropout:        0.2           -> 0.1
#   - hidden_dim:     128           -> 64
#   - num_heads:      2             -> 1
#   - cosine_t_max:   10            -> 30
#   - batch_size:     256           -> 512
#   - sigma:          1.43          -> 1.76
experiment:
  name: p3_eahgt_both_bilinear_v2_s42
data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/graph/hetero_graph_with_features_datatype.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/progression/temporal_graph_datatype_mappings.pt
  undirected: true
  train_cutoff_year: 2010
  val_min_year: 2013
  val_max_year: 2013
model:
  name: hgt
  hidden_dim: 64
  num_heads: 1
  num_layers: 2
  dropout: 0.1
  use_rte: false
  use_edge_features: true
  edge_feat_cols: [0, 1]
  edge_feat_dim: 2
  decoder_kind: bilinear_lr16
  decoder_dropout: 0.4
train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/23.06/runs/headline_bilinear_v2/p3_eahgt_both_s42
  num_epochs: 50
  lr: 1.1491854913324184e-5
  weight_decay: 0.009754852196922572
  eta_min: 1.0e-7
  cosine_t_max: 30
  batch_size: 512
  num_neighbors: [20, 5]
  lambdarank:
    impl: allrank
    weighing_scheme: lambdaRank_scheme
    sigma: 1.7592082624240155
    ndcg_k: 50
  early_stopping:
    enabled: true
    patience: 10
    metric: rs_ta_mean@50
    mode: max
seed: 42
