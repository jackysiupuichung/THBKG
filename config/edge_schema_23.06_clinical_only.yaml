# Fast-path schema: only chembl edges (23.06).
# Used to re-emit clinical edges after Stage B mutation without re-running
# every other datasource. Mirrors the 26.03 fast-path.
#
# Direction kept as disease -> target to match historical 23.06 graph layout.

chembl:
  - input_dir: sourceId=chembl
    name: chembl
    sourceId: diseaseId
    targetId: targetId
    relation: trial_outcome_bucket
    props: [source_type=constant:disease, target_type=constant:target, clinicalStatus, studyStopReasonCategories, datasourceId, score, year, id]

  - name: chembl
    sourceId: targetId
    targetId: drugId
    relation_name: modulated_by
    props: [source_type=constant:target, target_type=constant:molecule, datasourceId, score=constant:1.0, year, id]
