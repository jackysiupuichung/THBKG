# Event Graph Configuration
# Defines parameters for building the temporal event graph from raw Open Targets evidence.

# ============================================================================
# NOTE: Datasource weights and datatype mappings are now in:
#       config/datatype_mapping.yaml
# This file only contains time range configuration.
# ============================================================================

time_range:
  # Represents the years for which we will generate cumulative scores
  # All evidence prior to these years is also considered
  first_year: 1995
  last_year: 2025
