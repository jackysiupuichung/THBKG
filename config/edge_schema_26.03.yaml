# NOTE: intogen now carries publicationDate/evidenceDate in 26.03 (78% coverage) and is wired below

gene_ontology:
  input_dir: targets
  sourceId: id
  targetId: go.id
  relation_name: has_function_in
  props: [
    datasourceId=constant:gene_ontology,
    score=constant:1.0,
    source_type=constant:target,
    target_type=constant:go,
    year
  ]

cancer_biomarkers:
  input_dir: sourceId=cancer_biomarkers
  name: cancer_biomarker
  sourceId: targetId
  targetId: diseaseId
  relation_name: affected_pathway
  props: [source_type=constant:target, target_type=constant:disease, datasourceId, score, year, id]

# chembl: removed — evidence_chembl absent from 26.03 FTP; replaced by clinical_precedence below
# chembl:
#   - input_dir: sourceId=chembl
#     name: chembl
#     sourceId: diseaseId
#     targetId: targetId
#     relation_name: clinical_trial
#     props: [source_type=constant:disease, target_type=constant:target, datasourceId, score, year, id]
#
#   - name: chembl
#     sourceId: targetId
#     targetId: drugId
#     relation_name: modulated_by
#     props: [source_type=constant:target, target_type=constant:molecule, datasourceId, score=constant:1.0, year, id]

clinical_precedence:
  # GATher-compatible inventory: drug->target (modulated_by) + target->disease
  # (bucketed by clinical outcome). drug->disease intentionally omitted; that
  # signal is reachable as a 2-hop drug -> target -> disease.
  # trial_outcome_bucket is one of: clinical_trial_positive, _unmet_efficacy,
  # _adverse_effects, _Unknown/Operational, _ongoing.
  # See preprocessing/.../apply_trial_resolution.py.
  - input_dir: sourceId=clinical_precedence
    sourceId: drugId
    targetId: targetId
    relation_name: modulated_by
    props: [source_type=constant:molecule, target_type=constant:target, datasourceId, score=constant:1.0, year, id]

  - input_dir: sourceId=clinical_precedence
    sourceId: targetId
    targetId: diseaseId
    relation: trial_outcome_bucket
    props: [source_type=constant:target, target_type=constant:disease, datasourceId, score, year, id]

reactome:
  - input_dir: sourceId=reactome
    name: reactome
    sourceId: targetId
    targetId: diseaseId
    relation_name: affected_pathway
    props: [source_type=constant:target, target_type=constant:disease, datasourceId, score, year, id]

  - input_dir: sourceId=reactome
    name: reactome
    sourceId: targetId
    targetId: pathways.id
    relation_name: involved_in
    props: [source_type=constant:target, target_type=constant:reactome, datasourceId, score=constant:1.0, year, id]

  # Restored 2026-06-02: pathways.id is present and populated in the 26.03
  # reactome parquet (list<struct<id,name>>); the "removed in 25.03" note below
  # is inaccurate. Mirrors involved_in but keyed on diseaseId.
  - input_dir: sourceId=reactome
    name: reactome
    sourceId: diseaseId
    targetId: pathways.id
    relation_name: associated_with
    props: [source_type=constant:disease, target_type=constant:reactome, datasourceId, score=constant:1.0, year, id]

