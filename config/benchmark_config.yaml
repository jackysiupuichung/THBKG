# OpenTargets Heterogeneous Graph Benchmarking Configuration
# SIMPLIFIED: Relation::Source Level Only

# Experiment name
experiment_name: "hgt_source_benchmark"

# WandB Logging
wandb:
  enabled: false
  project: "opentargets-graph"
  entity: null
  name: null

# Data configuration
data:
  # Temporal event graph
  temporal_graph_file: "output/graph/hetero_graph_with_features.pt"
  
  # Temporal split configuration
  temporal_split:
    train: [2000, 2016]
    val: [2017, 2017]
    test: [2018, 2025]
    
  graph:
    mode: "event"
    
    # Supervision task (link prediction target)
    supervision:
      src_type: "disease"
      relation: "clinical_trial::chembl"
      dst_type: "target"

# Model configuration
model:
  # Node features
  node_features:
    init_method: "random"  # Random initialization
    embedding_dim: 128
  
  # HGT architecture
  hgt:
    hidden_dim: 128
    num_heads: 4
    num_layers: 2
    dropout: 0.1

# Training configuration
train:
  batch_size: 512
  num_epochs: 10
  lr: 0.001
  weight_decay: 0.0
  seed: 42
  
  # Early stopping
  early_stopping:
    enabled: true
    patience: 10
    monitor: "val_loss"

# Evaluation configuration
eval:
  k_values: [200, 500]
  
  # Cold start evaluation
  cold_start:
    enabled: false
    min_interactions: 5
